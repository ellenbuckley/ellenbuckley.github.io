# site url (used to build og:url / twitter:url and other absolute links)
url: https://www.ellenbuckley.com

# site properties and page defaults
title: The Buckley Lab
subtitle: Sea ice and polar oceans, observed from above
description: We study the dynamics of sea ice and the polar oceans using remote sensing and field observations, integrating satellite, airborne, and in-situ data to understand a rapidly changing Arctic and Antarctic.
header: images/IMG_0812.png
# header-video: a video (mp4) to autoplay behind the header instead of a static image.
# Upload the file to videos/header.mp4 in the repo root, then uncomment the line below.
# The `header` image above is still used as the poster/fallback for browsers that can't
# play the video and for visitors with "reduce motion" preferences enabled.
# header-video: videos/header.mp4
footer: images/IMG_0812.png
proofer: false

# site social media and other links
links:
  email: buckley0@illinois.edu
  orcid: 0000-0001-7415-5054
  google-scholar: WyKsIMwAAAAJ&hl
  github: ellenbuckley
  twitter: ellenmbuckley
  #youtube: ellenbuckley

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
